<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>쉼, 멍: 내 주변 힐링 명소 찾기</title>
    <style>
        /* 기본 스타일 초기화 및 폰트 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #f7f9fc;
        }

        /* 상단 타이틀 스타일 */
        .app-header {
            background: linear-gradient(135deg, #a8ff78, #78ffd6);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .app-header h1 {
            margin: 0;
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
        }
        .app-header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #34495e;
        }

        /* 탭 메뉴 스타일 */
        .tab-container {
            display: flex;
            background-color: #fff;
            border-bottom: 2px solid #ddd;
        }
        .tab-button {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #7f8c8d;
            border: none;
            background: none;
            transition: all 0.3s ease;
        }
        .tab-button.active {
            color: #27ae60;
            border-bottom: 3px solid #27ae60;
            background-color: #f1f9f5;
        }

        /* 지도 영역 스타일 */
        #map {
            width: 100%;
            height: 60vh; /* 화면 높이의 60% 사용 */
            background-color: #eee; /* 지도 로딩 전 회색 배경 표시 */
        }

        /* 장소 리스트 스타일 */
        #places-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 25vh;
            overflow-y: auto;
            background-color: #fff;
        }
        #places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        #places-list li:hover {
            background-color: #f9f9f9;
        }
        #places-list .place-name {
            font-weight: bold;
            color: #333;
        }
        #places-list .place-address {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>쉼, 멍 🍃</h1>
        <p>복잡한 생각은 비우고, 자연 속에서 멍하니 쉬어가기</p>
    </div>

    <div class="tab-container">
        <button id="tab-grass" class="tab-button active" onclick="switchTab('grass')">🌱 풀멍 명소</button>
        <button id="tab-water" class="tab-button" onclick="switchTab('water')">🌊 물멍 명소</button>
    </div>

    <div id="map"></div>

    <ul id="places-list"></ul>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=99b82b9be154cb118a8039daeb234c9f&libraries=services"></script>
    <script>
        // 글로벌 변수 선언
        let map;
        let placeService;
        let currentMarker; // 현재 위치 마커
        let placeMarkers = []; // 검색된 명소 마커 배열
        let currentKeyword = "공원 수목원"; // 기본 검색어 (풀멍)
        
        // 기본 위치 설정 (사용자가 권한 거부하거나 로딩 전 보여줄 임시 중심지: 서울시청)
        let userLatitude = 37.566826; 
        let userLongitude = 126.9786567; 

        // 페이지 로드 시 바로 실행
        window.onload = function() {
            initMap();             // 1. 지도를 먼저 무조건 띄운다!
            getCurrentLocation();  // 2. 그 다음 사용자에게 위치 권한을 요청한다!
        };

        // 지도 초기화 함수 (기본 위치로 먼저 생성)
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLatitude, userLongitude),
                level: 5 // 지도 확대 레벨
            };

            // 지도 객체 생성 및 서비스 라이브러리 초기화
            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places();
        }

        // 사용자의 현재 위치를 요청하고 처리하는 함수
        function getCurrentLocation() {
            // 브라우저가 GPS 위치 탐색을 지원하는지 확인
            if (navigator.geolocation) {
                // 이 명령어가 실행될 때 브라우저 상단에 "위치 권한 허용" 팝업이 뜸!
                navigator.geolocation.getCurrentPosition(function(position) {
                    // 사용자가 [허용]을 누른 경우 실행되는 구간
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    const currentPos = new kakao.maps.LatLng(userLatitude, userLongitude);

                    // 지도를 현재 위치로 이동시키고 마커 표시
                    map.setCenter(currentPos);
                    displayCurrentLocationMarker(currentPos);

                    // 현재 위치 기준 명소 검색 시작
                    searchHealingPlaces();
                }, function(error) {
                    // 사용자가 [차단/거부]를 누르거나 에러가 난 경우
                    alert('위치 권한이 거부되었거나 위치를 찾을 수 없어 기본 위치로 명소를 검색합니다.');
                    searchHealingPlaces();
                });
            } else {
                // 브라우저가 기능을 지원하지 않는 경우
                alert('이 브라우저에서는 위치 정보 기능을 지원하지 않습니다.');
                searchHealingPlaces();
            }
        }

        // 현재 위치를 지도에 마커로 표시하는 함수
        function displayCurrentLocationMarker(position) {
            if (currentMarker) {
                currentMarker.setMap(null); // 기존 마커가 있다면 제거
            }

            //
