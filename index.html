<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨, 고르다 : 생각을 비우는 공간</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=486285cc8eaace2dade6833425ef6538"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #fafafa;
        }
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eef2f3;
            background-color: #ffffff;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        .site-header {
            padding: 25px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            text-align: center;
        }
        .site-title {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .site-subtitle {
            font-size: 12px;
            color: #7f8c8d;
            letter-spacing: 1px;
        }
        .tab-group {
            display: flex;
            background-color: #f1f2f6;
            border-bottom: 1px solid #e0e0e0;
        }
        .tab-button {
            flex: 1;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            color: #7f8c8d;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .tab-button.active {
            background-color: #ffffff;
            color: #2c3e50;
            border-bottom: 3px solid #2ecc71;
        }
        .tab-button.active.ocean-tab {
            border-bottom: 3px solid #3498db;
        }
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #fcfcfc;
        }
        .place-item {
            padding: 15px;
            background-color: #ffffff;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #f1f2f6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .place-item:hover {
            background-color: #f8f9fa;
            border-color: #dcdde1;
            transform: translateY(-2px);
        }
        .place-name {
            font-size: 16px;
            font-weight: bold;
            color: #2f3640;
            margin-bottom: 6px;
        }
        .place-address {
            font-size: 13px;
            color: #718093;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .place-distance {
            font-size: 12px;
            color: #e84118;
            font-weight: bold;
        }
        .map-container {
            flex: 1;
            height: 100%;
        }
        .popup-content {
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 180px;
        }
        .popup-title {
            font-weight: bold;
            font-size: 14px;
            color: #2f3640;
            margin-bottom: 4px;
        }
        .popup-link {
            display: inline-block;
            margin-top: 5px;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="site-header">
                <div class="site-title">숨, 고르다</div>
                <div class="site-subtitle">생각을 비우는 나만의 멍때리기 명소</div>
            </div>
            
            <div class="tab-group">
                <button class="tab-button active" id="parkTab" onclick="switchTab('park')">🌳 한적한 공원 (풀멍)</button>
                <button class="tab-button" id="oceanTab" onclick="switchTab('ocean')">🌊 한적한 바다 (물멍)</button>
            </div>
            <div class="list-container" id="placeList"></div>
        </div>

        <div class="map-container" id="map"></div>
    </div>

    <script>
        const samplePlaces = [
            { type: 'park', name: '선유도공원', lat: 37.5424, lng: 126.8992, address: '서울 영등포구 선유로 343', link: 'https://map.kakao.com/link/map/37.5424,126.8992' },
            { type: 'park', name: '서울숲 소생물지구', lat: 37.5443, lng: 127.0374, address: '서울 성동구 뚝섬로 273', link: 'https://map.kakao.com/link/map/37.5443,127.0374' },
            { type: 'park', name: '율동공원 책테마파크 앞', lat: 37.3785, lng: 127.1482, address: '경기 성남시 분당구 문정로 145', link: 'https://map.kakao.com/link/map/37.3785,127.1482' },
            { type: 'ocean', name: '을왕리 해수욕장 조용한 스팟', lat: 37.4464, lng: 126.3712, address: '인천 중구 을왕동', link: 'https://map.kakao.com/link/map/37.4464,126.3712' },
            { type: 'ocean', name: '오이도 빨간등대 인근', lat: 37.3452, lng: 126.6874, address: '경기 시흥시 정왕동', link: 'https://map.kakao.com/link/map/37.3452,126.6874' }
        ];

        let map;
        let infoWindow;
        let currentTab = 'park'; 
        let markers = []; 
        let userMarkerOverlay; 
        
        // 위치를 차단하거나 못 가져왔을 때 쓸 기본 중심점 (서울시청)
        let userLocation = { lat: 37.5665, lng: 126.9780 }; 

        // [핵심 변경] 페이지가 열리자마자 브라우저에 위치 권한 창부터 "강제로" 띄웁니다.
        window.onload = function() {
            if (navigator.geolocation) {
                // 이 함수가 실행되는 순간 브라우저 상단에 권한 허용 팝업이 뜹니다.
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        // 사용자가 [허용]을 눌렀을 때 실행되는 구간
                        userLocation.lat = position.coords.latitude;
                        userLocation.lng = position.coords.longitude;
                        
                        // 내 위치가 반영된 상태로 지도와 서비스 초기화
                        initMap();
                        showUserLocationMarker(new kakao.maps.LatLng(userLocation.lat, userLocation.lng));
                    },
                    function(error) {
                        // 사용자가 [차단]을 누르거나 오류가 났을 때 실행되는 구간 (서울시청 기준으로 안전하게 띄움)
                        console.log("위치 권한이 거부되었거나 오류가 발생했습니다.");
                        initMap();
                        showUserLocationMarker(new kakao.maps.LatLng(userLocation.lat, userLocation.lng));
                    }
                );
            } else {
                // GPS를 지원하지 않는 오래된 브라우저 대응
                initMap();
                showUserLocationMarker(new kakao.maps.LatLng(userLocation.lat, userLocation.lng));
            }
        };

        // 지도를 생성하고 리스트를 그리는 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLocation.lat, userLocation.lng),
                level: 8
            };
            map = new kakao.maps.Map(mapContainer, mapOptions);
            infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });
            
            // 지도 생성과 동시에 명소 리스트 렌더링
            updateService();
        }

        // 내 위치를 나타내는 빨간색 커스텀 마커 표시 함수
        function showUserLocationMarker(position) {
            if (userMarkerOverlay) {
                userMarkerOverlay.setMap(null);
            }
            // 빨간색 핀 커스텀 디자인
            const userMarkerContent = `<div style="width: 14px; height: 14px; background-color: #ff4757; border: 3px solid #ffffff; border-radius: 50%; box-shadow: 0 0 8px rgba(255, 71, 87, 0.8);"></div>`;
            userMarkerOverlay = new kakao.maps.CustomOverlay({
                position: position,
                content: userMarkerContent,
                xAnchor: 0.5,
                yAnchor: 0.5
            });
            userMarkerOverlay.setMap(map);
        }

        // 하버사인 거리 계산 공식
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const r = 6371; 
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return r * c;
        }

        // 데이터를 기반으로 사이드바 리스트와 마커를 뿌려주는 함수
        function updateService() {
            clearMarkers();
            infoWindow.close();

            let filteredPlaces = samplePlaces.filter(place => place.type === currentTab);

            filteredPlaces.forEach(place => {
                place.distance = calculateDistance(userLocation.lat, userLocation.lng, place.lat, place.lng);
            });

            filteredPlaces.sort((a, b) => a.distance - b.distance);

            const listContainer = document.getElementById('placeList');
            listContainer.innerHTML = ''; 

            filteredPlaces.forEach((place, index) => {
                const listItem = document.createElement('div');
                listItem.className = 'place-item';
                
                const displayDistance = place.distance < 1 
                    ? `${Math.round(place.distance * 1000)}m` 
                    : `${place.distance.toFixed(1)}km`;

                listItem.innerHTML = `
                    <div class="place-name">${place.name}</div>
                    <div class="place-address">${place.address}</div>
                    <div class="place-distance">📍 내 위치에서 ${displayDistance}</div>
                `;
                
                listItem.onclick = function() {
                    focusOnPlace(place, markers[index]);
                };
                listContainer.appendChild(listItem);

                const markerPosition = new kakao.maps.LatLng(place.lat, place.lng);
                const marker = new kakao.maps.Marker({
                    map: map,
                    position: markerPosition
                });

                markers.push(marker);

                kakao.maps.event.addListener(marker, 'click', function() {
                    openPopup(place, marker);
                });
            });
        }

        function focusOnPlace(place, marker) {
            const moveLocation = new kakao.maps.LatLng(place.lat, place.lng);
            map.panTo(moveLocation);
            openPopup(place, marker);
        }

        function openPopup(place, marker) {
            const content = `
                <div class="popup-content">
                    <div class="popup-title">${place.name}</div>
                    <div class="popup-address">${place.address}</div>
                    <a class="popup-link" href="${place.link}" target="_blank">카카오맵에서 보기 →</a>
                </div>
            `;
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
        }

        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
        }

        function switchTab(type) {
            currentTab = type;
            const parkButton = document.getElementById('parkTab');
            const oceanButton = document.getElementById('oceanTab');

            if (type === 'park') {
                parkButton.classList.add('active');
                parkButton.classList.remove('ocean-tab');
                oceanButton.classList.remove('active', 'ocean-tab');
            } else {
                oceanButton.classList.add('active', 'ocean-tab');
                parkButton.classList.remove('active');
            }
            updateService();
        }
    </script>
</body>
</html>
