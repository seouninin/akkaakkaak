<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멍때리기 명소 추천 서비스</title>
    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=486285cc8eaace2dade6833425ef6538"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        /* 전체 레이아웃 구성을 위한 플렉스 박스 */
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        /* 왼쪽 사이드바 스타일 */
        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background-color: #f9f9f9;
            z-index: 10;
        }
        /* 탭 메뉴 스타일 */
        .tab-group {
            display: flex;
            background-color: #e0e0e0;
        }
        .tab-button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            background: none;
            cursor: pointer;
            transition: background 0.3s;
            text-align: center;
        }
        .tab-button.active {
            background-color: #ffffff;
            color: #2c3e50;
            border-bottom: 3px solid #2ecc71; /* 풀멍은 초록 계열 */
        }
        .tab-button.active.ocean-tab {
            border-bottom: 3px solid #3498db; /* 물멍은 파랑 계열 */
        }
        /* 리스트 영역 스타일 */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .place-item {
            padding: 15px;
            background-color: #ffffff;
            margin-bottom: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .place-item:hover {
            background-color: #f1f2f6;
            transform: translateY(-2px);
        }
        .place-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .place-address {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }
        .place-distance {
            font-size: 12px;
            color: #ff4757;
            font-weight: bold;
        }
        /* 오른쪽 지도 영역 스타일 */
        .map-container {
            flex: 1;
            height: 100%;
        }
        /* 인포윈도우 팝업 콘텐츠 스타일 */
        .popup-content {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
        .popup-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .popup-link {
            display: inline-block;
            margin-top: 5px;
            color: #3498db;
            text-decoration: none;
        }
        .popup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="tab-group">
                <button class="tab-button active" id="parkTab" onclick="switchTab('park')">🌳 한
