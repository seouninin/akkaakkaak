<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>쉼, 멍: 내 주변 힐링 명소 찾기</title>
    <style>
        /* 기본 스타일 초기화 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #f7f9fc;
        }

        /* 상단 타이틀 스타일 */
        .app-header {
            background: linear-gradient(135deg, #a8ff78, #78ffd6);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .app-header h1 {
            margin: 0;
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
        }
        .app-header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #34495e;
        }

        /* 탭 메뉴 스타일 */
        .tab-container {
            display: flex;
            background-color: #fff;
            border-bottom: 2px solid #ddd;
        }
        .tab-button {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #7f8c8d;
            border: none;
            background: none;
            transition: all 0.3s ease;
        }
        .tab-button.active {
            color: #27ae60;
            border-bottom: 3px solid #27ae60;
            background-color: #f1f9f5;
        }

        /* 지도 영역 스타일 */
        #map {
            width: 100%;
            height: 60vh;
            background-color: #eee;
        }

        /* 장소 리스트 스타일 */
        #places-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 25vh;
            overflow-y: auto;
            background-color: #fff;
        }
        #places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        #places-list li:hover {
            background-color: #f9f9f9;
        }
        .place-name {
            font-weight: bold;
            color: #333;
        }
        .place-address {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .place-distance {
            font-size: 11px;
            color: #27ae60;
            font-weight: bold;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>쉼, 멍 🍃</h1>
        <p>복잡한 생각은 비우고, 자연 속에서 멍하니 쉬어가기</p>
    </div>

    <div class="tab-container">
        <button id="tab-park" class="tab-button active" onclick="switchTab('park')">🌳 공원 명소</button>
        <button id="tab-sea" class="tab-button" onclick="switchTab('sea')">🌊 바다 명소</button>
    </div>

    <div id="map"></div>

    <ul id="places-list"></ul>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=99b82b9be154cb118a8039daeb234c9f&libraries=services"></script>
    <script>
        // 글로벌 변수 선언
        let map;
        let placeService;
        let currentMarker; // 현재 위치 마커
        let placeMarkers = []; // 검색된 명소 마커 배열
        
        // 검색에 사용할 카테고리 코드들과 현재 탭 상태
        const categoryCodes = ['AT4', 'CT1', 'PO3']; 
        let currentCategoryIndex = 0; // 현재 탐색 중인 카테고리 배열 인덱스
        let accumulatedPlaces = []; // 여러 카테고리 결과를 모아둘 배열
        let currentTab = 'park'; // 현재 선택된 탭 ('park' 또는 'sea')

        // 기본 위치 설정 (서울시청)
        let userLatitude = 37.566826; 
        let userLongitude = 126.9786567; 

        // 페이지 로드 시 실행
        window.onload = function() {
            initMap();             // 1. 지도 먼저 생성
            getCurrentLocation();  // 2. 위치 권한 요청 및 추적
        };

        // 지도 초기화 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLatitude, userLongitude),
                level: 5
            };
            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places();
        }

        // 사용자의 현재 위치를 요청하는 함수
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    const currentPos = new kakao.maps.LatLng(userLatitude, userLongitude);

                    map.setCenter(currentPos);
                    displayCurrentLocationMarker(currentPos);
                    startCategorySearch(); // 위치를 잡으면 검색 시작
                }, function(error) {
                    alert('위치 허용이 거부되었거나 GPS를 켤 수 없어 기본 위치로 검색합니다.');
                    startCategorySearch();
                });
            } else {
                alert('이 브라우저에서는 위치 정보를 사용할 수 없습니다.');
                startCategorySearch();
            }
        }

        // 내 위치 마커 표시 함수
        function displayCurrentLocationMarker(position) {
            if (currentMarker) currentMarker.setMap(null);

            currentMarker = new kakao.maps.Marker({
                map: map,
                position: position
            });

            const infoWindow = new kakao.maps.InfoWindow({
                content: '<div style="padding:5px;font-size:12px;text-align:center;font-weight:bold;color:#2f80ed;">내 위치</div>'
            });
            infoWindow.open(map, currentMarker);
        }

        // 탭 전환 함수
        function switchTab(type) {
            currentTab = type;
            document.getElementById('tab-park').classList.remove('active');
            document.getElementById('tab-sea').classList.remove('active');

            if (type === 'park') {
                document.getElementById('tab-park').classList.add('active');
            } else {
                document.getElementById('tab-sea').classList.add('active');
            }

            removePlaceMarkers();
            startCategorySearch(); // 탭이 바뀌면 새로 검색 실행
        }

        // 카테고리 반복 검색을 시작하는 함수
        function startCategorySearch() {
            accumulatedPlaces = []; // 기존 데이터 초기화
            currentCategoryIndex = 0;
            searchNextCategory();
        }

        // 배열에 담긴 카테고리 코드를 순서대로 검색하는 함수
        function searchNextCategory() {
            if (currentCategoryIndex >= categoryCodes.length) {
                // 모든 카테고리(AT4, CT1, PO3) 조회가 끝났다면 결과를 정렬하고 화면에 표시
                processAndDisplayPlaces();
                return;
            }

            const currentCode = categoryCodes[currentCategoryIndex];

            // 카테고리 서치 실행 (속도가 빠르고 정확함)
            placeService.categorySearch(currentCode, function(data, status) {
                if (status === kakao.maps.services.Status.OK) {
                    // 결과를 누적 배열에 추가
                    accumulatedPlaces = accumulatedPlaces.concat(data);
                }
                // 결과가 있든 없든 다음 카테고리 코드로 넘어가서 검색 진행
                currentCategoryIndex++;
                searchNextCategory();
            }, {
                location: new kakao.maps.LatLng(userLatitude, userLongitude),
                radius: 5000, // 5km 반경
                sort: kakao.maps.services.SortBy.DISTANCE // 가까운 순으로 정렬 요청
            });
        }

        // 수집된 데이터를 필터링하고 가까운 순으로 나열하는 함수
        function processAndDisplayPlaces() {
            let filteredPlaces = [];

            // 현재 선택된 탭에 맞춰서 장소 이름에 해당 키워드가 들어있는 것만 필터링
            if (currentTab === 'park') {
                filteredPlaces = accumulatedPlaces.filter(place => place.place_name.includes('공원'));
            } else if (currentTab === 'sea') {
                filteredPlaces = accumulatedPlaces.filter(place => 
                    place.place_name.includes('바다') || 
                    place.place_name.includes('해변') || 
                    place.place_name.includes
