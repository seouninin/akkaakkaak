<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>쉼, 멍: 내 주변 힐링 명소 찾기</title>
    <style>
        /* 기본 스타일 초기화 및 폰트 설정 */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #f7f9fc;
        }

        /* 상단 타이틀 스타일 */
        .app-header {
            background: linear-gradient(135deg, #a8ff78, #78ffd6);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .app-header h1 {
            margin: 0;
            font-size: 24px;
            color: #2c3e50;
            font-weight: bold;
        }
        .app-header p {
            margin: 5px 0 0 0;
            font-size: 14px;
            color: #34495e;
        }

        /* 탭 메뉴 스타일 */
        .tab-container {
            display: flex;
            background-color: #fff;
            border-bottom: 2px solid #ddd;
        }
        .tab-button {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            color: #7f8c8d;
            border: none;
            background: none;
            transition: all 0.3s ease;
        }
        .tab-button.active {
            color: #27ae60;
            border-bottom: 3px solid #27ae60;
            background-color: #f1f9f5;
        }

        /* 지도 영역 스타일 */
        #map {
            width: 100%;
            height: 60vh; /* 화면 높이의 60% 사용 */
        }

        /* 장소 리스트 스타일 */
        #places-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 25vh;
            overflow-y: auto;
            background-color: #fff;
        }
        #places-list li {
            padding: 15px;
            border-bottom: 1px solid #eee;
            cursor: pointer;
        }
        #places-list li:hover {
            background-color: #f9f9f9;
        }
        #places-list .place-name {
            font-weight: bold;
            color: #333;
        }
        #places-list .place-address {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="app-header">
        <h1>쉼, 멍 🍃</h1>
        <p>복잡한 생각은 비우고, 자연 속에서 멍하니 쉬어가기</p>
    </div>

    <div class="tab-container">
        <button id="tab-grass" class="tab-button active" onclick="switchTab('grass')">🌱 풀멍 명소</button>
        <button id="tab-water" class="tab-button" onclick="switchTab('water')">🌊 물멍 명소</button>
    </div>

    <div id="map"></div>

    <ul id="places-list"></ul>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=99b82b9be154cb118a8039daeb234c9f&libraries=services"></script>
    <script>
        // 글로벌 변수 선언
        let map;
        let placeService;
        let currentMarker; // 현재 위치 마커
        let placeMarkers = []; // 검색된 명소 마커 배열
        let currentKeyword = "공원 수목원"; // 기본 검색어 (풀멍)
        let userLatitude = 37.566826; // 기본 위도 (서울시청 기준 부트스트랩)
        let userLongitude = 126.9786567; // 기본 경도

        // 페이지 로드 시 실행
        window.onload = function() {
            initMap();
            getCurrentLocation();
        };

        // 지도 초기화 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLatitude, userLongitude),
                level: 5 // 주변 명소가 잘 보이도록 줌 레벨 조정
            };

            map = new kakao.maps.Map(mapContainer, mapOptions);
            placeService = new kakao.maps.services.Places();
        }

        // 사용자의 현재 위치를 가져오는 함수
        function getCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    userLatitude = position.coords.latitude;
                    userLongitude = position.coords.longitude;
                    const currentPos = new kakao.maps.LatLng(userLatitude, userLongitude);

                    // 지도 중심을 현재 위치로 이동
                    map.setCenter(currentPos);

                    // 현재 위치 마커 표시
                    displayCurrentLocationMarker(currentPos);

                    // 현재 위치 기준으로 첫 번째 탭(풀멍) 검색 실행
                    searchHealingPlaces();
                }, function(error) {
                    alert('GPS 위치를 가져올 수 없어 기본 위치로 검색합니다.');
                    searchHealingPlaces();
                });
            } else {
                alert('이 브라우저에서는 Geolocation을 지원하지 않습니다.');
                searchHealingPlaces();
            }
        }

        // 현재 위치를 지도에 마커로 표시하는 함수
        function displayCurrentLocationMarker(position) {
            if (currentMarker) {
                currentMarker.setMap(null); // 기존 마커가 있다면 제거
            }

            // 현재 위치는 구분하기 쉽게 파란색 동그라미 이미지로 표시 (카카오 기본 마커와 차별화)
            const imageSrc = 'https://t1.daumcdn.net/localimg/localimages/07/2018/pc/img/marker_spot.png'; 
            const imageSize = new kakao.maps.Size(24, 35);
            const markerImage = new kakao.maps.MarkerImage(imageSrc, imageSize);

            currentMarker = new kakao.maps.Marker({
                map: map,
                position: position,
                title: "내 현재 위치"
            });

            // 현재 위치임을 알리는 인포윈도우 추가
            const infoWindow = new kakao.maps.InfoWindow({
                content: '<div style="padding:5px;font-size:12px;text-align:center;">내 위치</div>'
            });
            infoWindow.open(map, currentMarker);
        }

        // 탭 전환 함수
        function switchTab(type) {
            // 버튼 활성화 스타일 변경
            document.getElementById('tab-grass').classList.remove('active');
            document.getElementById('tab-water').classList.remove('active');

            if (type === 'grass') {
                document.getElementById('tab-grass').classList.add('active');
                currentKeyword = "공원 수목원"; // 풀멍 검색 키워드
            } else if (type === 'water') {
                document.getElementById('tab-water').classList.add('active');
                currentKeyword = "한강 바다 계곡 강"; // 물멍 검색 키워드
            }

            // 기존 마커 및 리스트 삭제 후 새로 검색
            removePlaceMarkers();
            searchHealingPlaces();
        }

        // 현재 위치 기반 명소 검색 함수
        function searchHealingPlaces() {
            // 기획서의 카테고리 코드(AT4: 관광명소, CT1: 문화시설) 조건 설정
            // 해당 카테고리 범위 내에서 풀멍/물멍 키워드로 현재 위치 중심 5km 이내 검색
            placeService.keywordSearch(currentKeyword, placesSearchCB, {
                location: new kakao.maps.LatLng(userLatitude, userLongitude),
                radius: 5000, 
                category_group_code: 'AT4' // 우선 관광명소(AT4) 카테고리 중심 검색
            });
        }

        // 장소검색 완료 시 호출되는 콜백함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                // 만약 AT4에서 결과가 없으면 CT1(문화시설) 카테고리로 재검색 (보완책)
                placeService.keywordSearch(currentKeyword, function(ctData, ctStatus) {
                    if (ctStatus === kakao.maps.services.Status.OK) {
                        displayPlaces(ctData);
                    } else {
                        clearPlacesList();
                        alert('주변에 명소를 찾을 수 없습니다.');
                    }
                }, {
                    location: new kakao.maps.LatLng(userLatitude, userLongitude),
                    radius: 5000,
                    category_group_code: 'CT1'
                });
            } else {
                alert('검색 중 오류가 발생했습니다.');
            }
        }

        // 검색된 장소들을 화면과 지도에 표시하는 함수
        function displayPlaces(places) {
            const listEl = document.getElementById('places-list');
            clearPlacesList(); // 기존 리스트 비우기

            const bounds = new kakao.maps.LatLngBounds();
            bounds.extend(new kakao.maps.LatLng(userLatitude, userLongitude)); // 현재 위치도 화면 범위에 포함

            for (let i = 0; i < places.length; i++) {
                const placePosition = new kakao.maps.LatLng(places[i].y, places[i].x);
                
                // 마커 생성 및 지도 표시
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                placeMarkers.push(marker);

                // 인포윈도우로 장소 이름 표시
                const infoWindow = new kakao.maps.InfoWindow({
                    content: `<div style="padding:5px;font-size:12px;white-space:nowrap;">${places[i].place_name}</div>`
                });

                // 마커 마우스오버 이벤트
                kakao.maps.event.addListener(marker, 'mouseover', function() {
                    infoWindow.open(map, marker);
                });
                kakao.maps.event.addListener(marker, 'mouseout', function() {
                    infoWindow.close();
                });

                // 하단 리스트 아이템 추가
                const liEl = document.createElement('li');
                liEl.innerHTML = `
                    <div class="place-name">${places[i].place_name}</div>
                    <div class="place-address">${places[i].road_address_name ? places[i].road_address_name : places[i].address_name}</div>
                `;

                // 리스트 클릭 시 지도 해당 위치로 부드럽게 이동
                liEl.onclick = function() {
                    map.panTo(placePosition);
                    infoWindow.open(map, marker);
                };

                listEl.appendChild(liEl);
                bounds.extend(placePosition);
            }

            // 검색된 장소들이 모두 보이도록 지도 시점 조절
            map.setBounds(bounds);
        }

        // 지도 위의 명소 마커들을 모두 지우는 함수
        function removePlaceMarkers() {
            for (let i = 0; i < placeMarkers.length; i++) {
                placeMarkers[i].setMap(null);
            }
            placeMarkers = [];
        }

        // 하단 명소 리스트를 비우는 함수
        function clearPlacesList() {
            const listEl = document.getElementById('places-list');
            listEl.innerHTML = '';
        }
    </script>
</body>
</html>
