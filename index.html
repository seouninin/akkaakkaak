<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오맵 장소 검색 서비스</title>
    <style>
        /* 기본 스타일 초기화 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }

        /* 전체 화면을 왼쪽과 오른쪽으로 2분할하는 컨테이너 */
        .container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 왼쪽: 검색창 및 결과 리스트 영역 (비율 30%) */
        .sidebar {
            width: 30%;
            height: 100%;
            background-color: #f7f7f7;
            border-right: 1px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            padding: 15px;
            z-index: 10;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
        }

        /* 검색창 스타일 */
        .search-box {
            display: flex;
            margin-bottom: 15px;
        }

        .search-box input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px 0 0 4px;
            font-size: 14px;
            outline: none;
        }

        .search-box button {
            padding: 10px 15px;
            background-color: #fee500; /* 카카오 시그니처 색상 */
            border: 1px solid #fee500;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: bold;
        }

        /* 검색 결과 리스트 스타일 (스크롤 가능하도록 설정) */
        .places-list {
            flex: 1;
            overflow-y: auto;
            list-style: none;
        }

        .place-item {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            background-color: #fff;
            margin-bottom: 8px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .place-item:hover {
            background-color: #f0f0f0;
        }

        .place-item h4 {
            margin-bottom: 5px;
            color: #333;
        }

        .place-item p {
            font-size: 13px;
            color: #666;
        }

        /* 오른쪽: 지도 영역 (비율 70%) */
        .map-container {
            width: 70%;
            height: 100%;
        }
    </style>

    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=486285cc8eaace2dade6833425ef6538&libraries=services&autoload=false"></script>
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="keyword-input" placeholder="장소를 검색해보세요 (예: 강남역맛집)">
                <button id="search-btn">검색</button>
            </div>
            <ul id="places-list" class="places-list"></ul>
        </div>

        <div id="map" class="map-container"></div>
    </div>

    <script>
        // 전역 변수 선언 (지도 객체와 장소 검색 객체)
        let map;
        let placeSearch;
        let currentMarkers = []; // 지도에 표시된 마커들을 관리하는 배열

        // 카카오맵 스크립트가 안전하게 완전히 로드된 후 실행
        kakao.maps.load(function () {
            initializeMap();
        });

        // 지도 초기화 함수
        function initializeMap() {
            const mapContainer = document.getElementById('map'); // 지도를 표시할 HTML 요소
            
            // 기본 중심 좌표 (사용자 위치를 못 가져올 경우를 대비한 기본값: 서울역)
            const defaultPosition = new kakao.maps.LatLng(37.5546788, 126.9706069); 
            
            const mapOptions = {
                center: defaultPosition, // 지도의 중심좌표
                level: 5 // 지도 확대 레벨 (요청사항: 5)
            };

            // 지도 생성
            map = new kakao.maps.Map(mapContainer, mapOptions);
            
            // 장소 검색 객체 생성
            placeSearch = new kakao.maps.services.Places();

            // HTML5의 Geolocation으로 현재 위치를 받아옵니다
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function (position) {
                    const lat = position.coords.latitude;  // 위도
                    const lon = position.coords.longitude; // 경도
                    
                    const currentPosition = new kakao.maps.LatLng(lat, lon);
                    
                    // 지도의 중심을 현재 위치로 이동시킵니다
                    map.setCenter(currentPosition);
                    
                    // 현재 위치에 표시할 마커 생성
                    const currentMarker = new kakao.maps.Marker({
                        position: currentPosition,
                        map: map
                    });
                    
                    // 마커 위에 표시할 인포윈도우 생성
                    const infoWindow = new kakao.maps.InfoWindow({
                        content: '<div style="padding:5px;font-size:12px;text-align:center;">현재 위치</div>'
                    });
                    infoWindow.open(map, currentMarker);
                    
                }, function (error) {
                    console.error("위치 정보를 가져오는 데 실패했습니다.", error);
                    alert("위치 권한을 허용하지 않아 기본 위치(서울역)로 표시합니다.");
                });
            } else {
                alert("이 브라우저에서는 현재 위치 기능을 지원하지 않습니다.");
            }

            // 이벤트 리스너 등록 (검색 버튼 클릭 및 엔터키 입력)
            document.getElementById('search-btn').addEventListener('click', searchPlaces);
            document.getElementById('keyword-input').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchPlaces();
                }
            });
        }

        // 키워드 장소 검색 함수
        function searchPlaces() {
            const keyword = document.getElementById('keyword-input').value.trim();

            if (!keyword) {
                alert('검색어를 입력해주세요!');
                return;
            }

            // 카카오 장소 검색 API 실행 (결과는 검색 완료 콜백 함수로 전달됨)
            placeSearch.keywordSearch(keyword, placesSearchCB);
        }

        // 장소검색이 완료됐을 때 호출되는 콜백 함수
        function placesSearchCB(data, status, pagination) {
            if (status === kakao.maps.services.Status.OK) {
                // 정상적으로 검색이 완료됐으면 지도와 리스트에 표시합니다
                displayPlaces(data);
            } else if (status === kakao.maps.services.Status.ZERO_RESULT) {
                alert('검색 결과가 존재하지 않습니다.');
            } else if (status === kakao.maps.services.Status.ERROR) {
                alert('검색 결과 중 오류가 발생했습니다.');
            }
        }

        // 검색 결과와 마커를 화면에 표시하는 함수
        function displayPlaces(places) {
            const listElement = document.getElementById('places-list');
            
            // 기존에 생성되어 있던 마커들과 검색 결과 리스트 초기화
            clearMarkers();
            listElement.innerHTML = '';

            // 지도를 재조정하기 위한 Bounds(영역) 객체 생성
            const bounds = new kakao.maps.LatLngBounds();

            // 검색된 장소 배열을 반복하면서 처리
            places.forEach(function (place) {
                const placePosition = new kakao.maps.LatLng(place.y, place.x);
                
                // 1. 지도에 마커 추가
                const marker = new kakao.maps.Marker({
                    position: placePosition,
                    map: map
                });
                currentMarkers.push(marker); // 마커 관리 배열에 저장
                
                // 검색된 모든 장소가 보이도록 영역 확장
                bounds.extend(placePosition);

                // 2. 왼쪽 사이드바에 추가할 리스트 아이템(HTML) 만들기
                const itemElement = document.createElement('li');
                itemElement.className = 'place-item';
                itemElement.innerHTML = `
                    <h4>${place.place_name}</h4>
                    <p>${place.road_address_name ? place.road_address_name : place.address_name}</p>
                    <p style="color: #999; font-size: 11px;">${place.phone ? place.phone : '전화번호 없음'}</p>
                `;

                // 리스트 아이템을 클릭했을 때 해당 위치로 지도 이동
                itemElement.addEventListener('click', function() {
                    map.setCenter(placePosition);
                    map.setLevel(3); // 클릭 시 조금 더 확대해서 보기
                });

                listElement.appendChild(itemElement);
            });

            // 검색된 장소들을 한눈에 볼 수 있도록 지도 범위 변경
            map.setBounds(bounds);
        }

        // 지도 위의 마커들을 모두 지우는 함수
        function clearMarkers() {
            currentMarkers.forEach(function (marker) {
                marker.setMap(null);
            });
            currentMarkers = [];
        }
    </script>
</body>
</html>
