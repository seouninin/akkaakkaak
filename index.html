<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멍때리기 명소 추천 서비스</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=486285cc8eaace2dade6833425ef6538"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
        }
        /* 전체 레이아웃 구성을 위한 플렉스 박스 */
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        /* 왼쪽 사이드바 스타일 */
        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #ccc;
            background-color: #f9f9f9;
            z-index: 10;
        }
        /* 탭 메뉴 스타일 */
        .tab-group {
            display: flex;
            background-color: #e0e0e0;
        }
        .tab-button {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            background: none;
            cursor: pointer;
            transition: background 0.3s;
            text-align: center;
        }
        .tab-button.active {
            background-color: #ffffff;
            color: #2c3e50;
            border-bottom: 3px solid #2ecc71; /* 풀멍 초록바 */
        }
        .tab-button.active.ocean-tab {
            border-bottom: 3px solid #3498db; /* 물멍 파란바 */
        }
        /* 리스트 영역 스타일 */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .place-item {
            padding: 15px;
            background-color: #ffffff;
            margin-bottom: 10px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s;
        }
        .place-item:hover {
            background-color: #f1f2f6;
            transform: translateY(-2px);
        }
        .place-name {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        .place-address {
            font-size: 13px;
            color: #666;
            margin-bottom: 5px;
        }
        .place-distance {
            font-size: 12px;
            color: #ff4757;
            font-weight: bold;
        }
        /* 오른쪽 지도 영역 스타일 */
        .map-container {
            flex: 1;
            height: 100%;
        }
        /* 인포윈도우 팝업 콘텐츠 스타일 */
        .popup-content {
            padding: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
        .popup-title {
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .popup-link {
            display: inline-block;
            margin-top: 5px;
            color: #3498db;
            text-decoration: none;
        }
        .popup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="tab-group">
                <button class="tab-button active" id="parkTab" onclick="switchTab('park')">🌳 한적한 공원 (풀멍)</button>
                <button class="tab-button" id="oceanTab" onclick="switchTab('ocean')">🌊 한적한 바다 (물멍)</button>
            </div>
            <div class="list-container" id="placeList">
                </div>
        </div>

        <div class="map-container" id="map"></div>
    </div>

    <script>
        // 멍때리기 명소 데이터 배열
        const samplePlaces = [
            { type: 'park', name: '선유도공원', lat: 37.5424, lng: 126.8992, address: '서울 영등포구 선유로 343', link: 'https://map.kakao.com/link/map/37.5424,126.8992' },
            { type: 'park', name: '서울숲 소생물지구', lat: 37.5443, lng: 127.0374, address: '서울 성동구 뚝섬로 273', link: 'https://map.kakao.com/link/map/37.5443,127.0374' },
            { type: 'park', name: '율동공원 책테마파크 앞', lat: 37.3785, lng: 127.1482, address: '경기 성남시 분당구 문정로 145', link: 'https://map.kakao.com/link/map/37.3785,127.1482' },
            { type: 'ocean', name: '을왕리 해수욕장 조용한 스팟', lat: 37.4464, lng: 126.3712, address: '인천 중구 을왕동', link: 'https://map.kakao.com/link/map/37.4464,126.3712' },
            { type: 'ocean', name: '오이도 빨간등대 인근', lat: 37.3452, lng: 126.6874, address: '경기 시흥시 정왕동', link: 'https://map.kakao.com/link/map/37.3452,126.6874' },
            { type: 'ocean', name: '궁평항 해안데크길', lat: 37.1162, lng: 126.6815, address: '경기 화성시 서신면 궁평항로', link: 'https://map.kakao.com/link/map/37.1162,126.6815' }
        ];

        let map;
        let infoWindow;
        let currentTab = 'park'; // 현재 선택된 탭 정보 ('park' 또는 'ocean')
        let markers = []; // 지도에 표시된 마커들을 관리하는 배열
        
        // 사용자의 기본 위치 (위치 수신 전 기본값: 서울시청)
        let userLocation = { lat: 37.5665, lng: 126.9780 }; 

        // 브라우저 로드가 완료되면 실행되는 함수
        window.onload = function() {
            initMap();
            updateService(); // 위치 정보를 받기 전 기본 위치 기준으로 먼저 화면을 그려줍니다.
            getUserCurrentLocation(); // 그 후 실시간 위치를 비동기로 받아와 갱신합니다.
        };

        // 카카오 지도를 초기 생성하는 함수
        function initMap() {
            const mapContainer = document.getElementById('map');
            const mapOptions = {
                center: new kakao.maps.LatLng(userLocation.lat, userLocation.lng),
                level: 8
            };
            map = new kakao.maps.Map(mapContainer, mapOptions);
            infoWindow = new kakao.maps.InfoWindow({ zIndex: 1 });
        }

        // 사용자의 실시간 GPS 위치를 가져오는 함수
        function getUserCurrentLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        userLocation.lat = position.coords.latitude;
                        userLocation.lng = position.coords.longitude;
                        
                        // 지도의 중심을 내 실제 위치로 이동
                        const newCenter = new kakao.maps.LatLng(userLocation.lat, userLocation.lng);
                        map.setCenter(newCenter);
                        
                        // 위치 파악이 완료되었으므로 거리 계산 후 재정렬
                        updateService();
                    },
                    function(error) {
                        console.log("위치 정보를 허용하지 않았거나 가져오는데 실패하여 기본 위치를 유지합니다.");
                    }
                );
            }
        }

        // 두 좌표 간의 직선 거리를 구하는 함수 (하버사인 공식 적용, 단위: km)
        function calculateDistance(lat1, lng1, lat2, lng2) {
            const r = 6371; // 지구 반지름
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLng / 2) * Math.sin(dLng / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return r * c;
        }

        // 탭 상태에 맞춰 데이터를 필터링하고 가까운 순 정렬 후 마커/리스트를 그리는 함수
        function updateService() {
            // 1. 기존 마커 지우기 및 인포윈도우 닫기
            clearMarkers();
            infoWindow.close();

            // 2. 현재 선택된 탭 타입만 필터링
            let filteredPlaces = samplePlaces.filter(place => place.type === currentTab);

            // 3. 내 위치를 기반으로 명소까지의 거리 계산 후 추가
            filteredPlaces.forEach(place => {
                place.distance = calculateDistance(userLocation.lat, userLocation.lng, place.lat, place.lng);
            });

            // 4. 가까운 순서(오름차순) 정렬
            filteredPlaces.sort((a, b) => a.distance - b.distance);

            // 5. UI 리스트 컨테이너 초기화
            const listContainer = document.getElementById('placeList');
            listContainer.innerHTML = ''; 

            // 6. 데이터 순회하며 왼쪽 리스트 아이템 및 우측 마커 생성
            filteredPlaces.forEach((place, index) => {
                const listItem = document.createElement('div');
                listItem.className = 'place-item';
                
                // 거리가 1km 미만이면 m로, 이상이면 km로 포맷팅
                const displayDistance = place.distance < 1 
                    ? `${Math.round(place.distance * 1000)}m` 
                    : `${place.distance.toFixed(1)}km`;

                listItem.innerHTML = `
                    <div class="place-name">${place.name}</div>
                    <div class="place-address">${place.address}</div>
                    <div class="place-distance">📍 내 위치에서 ${displayDistance}</div>
                `;
                
                // 왼쪽 목록 클릭 시 지도를 해당 위치로 이동시키고 팝업 띄우기
                listItem.onclick = function() {
                    focusOnPlace(place, markers[index]);
                };
                listContainer.appendChild(listItem);

                // 카카오 지도 마커 인스턴스 생성 및 지도 위에 표시
                const markerPosition = new kakao.maps.LatLng(place.lat, place.lng);
                const marker = new kakao.maps.Marker({
                    map: map,
                    position: markerPosition
                });

                markers.push(marker);

                // 마커 클릭 시 정보 팝업창 띄우기
                kakao.maps.event.addListener(marker, 'click', function() {
                    openPopup(place, marker);
                });
            });
        }

        // 목록 클릭 시 지도를 부드럽게 이동하고 팝업을 열어주는 연동 함수
        function focusOnPlace(place, marker) {
            const moveLocation = new kakao.maps.LatLng(place.lat, place.lng);
            map.panTo(moveLocation);
            openPopup(place, marker);
        }

        // 마커 클릭 시 보여줄 정보창(인포윈도우) 컴포넌트 생성 함수
        function openPopup(place, marker) {
            const content = `
                <div class="popup-content">
                    <div class="popup-title">${place.name}</div>
                    <div class="popup-address">${place.address}</div>
                    <a class="popup-link" href="${place.link}" target="_blank">카카오맵에서 보기 →</a>
                </div>
            `;
            infoWindow.setContent(content);
            infoWindow.open(map, marker);
        }

        // 지도 위 모든 마커를 지우는 함수
        function clearMarkers() {
            markers.forEach(marker => marker.setMap(null));
            markers = [];
        }

        // 상단 풀멍/물멍 탭 스위칭 함수
        function switchTab(type) {
            currentTab = type;
            
            const parkButton = document.getElementById('parkTab');
            const oceanButton = document.getElementById('oceanTab');

            if (type === 'park') {
                parkButton.classList.add('active');
                parkButton.classList.remove('ocean-tab');
                oceanButton.classList.remove('active', 'ocean-tab');
            } else {
                oceanButton.classList.add('active', 'ocean-tab');
                parkButton.classList.remove('active');
            }

            // 탭 변경 상태값 기준으로 화면 리렌더링
            updateService();
        }
    </script>
</body>
</html>
