<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>숨, 고르다 : 생각을 비우는 공간</title>
    <script type="text/javascript" src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=486285cc8eaace2dade6833425ef6538"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            height: 100%;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #fafafa;
        }
        /* 전체 화면 레이아웃 구성 */
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
        }
        /* 왼쪽 사이드바 스타일 */
        .sidebar {
            width: 380px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #eef2f3;
            background-color: #ffffff;
            z-index: 10;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }
        /* 감성적인 사이트 제목 영역 */
        .site-header {
            padding: 25px 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            text-align: center;
        }
        .site-title {
            font-size: 22px;
            font-weight: bold;
            color: #2c3e50;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .site-subtitle {
            font-size: 12px;
            color: #7f8c8d;
            letter-spacing: 1px;
        }
        /* 탭 메뉴 스타일 */
        .tab-group {
            display: flex;
            background-color: #f1f2f6;
            border-bottom: 1px solid #e0e0e0;
        }
        .tab-button {
            flex: 1;
            padding: 15px;
            font-size: 15px;
            font-weight: bold;
            color: #7f8c8d;
            border: none;
            background: none;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        .tab-button.active {
            background-color: #ffffff;
            color: #2c3e50;
            border-bottom: 3px solid #2ecc71; /* 풀멍 초록 바 */
        }
        .tab-button.active.ocean-tab {
            border-bottom: 3px solid #3498db; /* 물멍 파란 바 */
        }
        /* 리스트 영역 스타일 */
        .list-container {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-color: #fcfcfc;
        }
        .place-item {
            padding: 15px;
            background-color: #ffffff;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #f1f2f6;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .place-item:hover {
            background-color: #f8f9fa;
            border-color: #dcdde1;
            transform: translateY(-2px);
        }
        .place-name {
            font-size: 16px;
            font-weight: bold;
            color: #2f3640;
            margin-bottom: 6px;
        }
        .place-address {
            font-size: 13px;
            color: #718093;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .place-distance {
            font-size: 12px;
            color: #e84118;
            font-weight: bold;
        }
        /* 오른쪽 지도 영역 스타일 */
        .map-container {
            flex: 1;
            height: 100%;
        }
        /* 인포윈도우 팝업 콘텐츠 스타일 */
        .popup-content {
            padding: 12px;
            font-size: 13px;
            line-height: 1.5;
            min-width: 180px;
        }
        .popup-title {
            font-weight: bold;
            font-size: 14px;
            color: #2f3640;
            margin-bottom: 4px;
        }
        .popup-address {
            color: #718093;
            font-size: 12px;
        }
        .popup-link {
            display: inline-block;
            margin-top: 6px;
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
        .popup-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="sidebar">
            <div class="site-header">
                <div class="site-title">숨, 고르다</div>
                <div class="site-subtitle">생각을 비우는 나만의 멍때리기 명소</div>
            </div>
            
            <div class="tab-group">
                <button class="tab-button active" id="parkTab" onclick="switchTab('park')">🌳 한적한 공원 (풀멍)</button>
                <button class="tab-button" id="oceanTab" onclick="switchTab('ocean')">🌊 한적한 바다 (물멍)</button>
            </div>
            <div class="list-container" id="placeList">
                </div>
        </div>

        <div class="map-container" id="map"></div>
    </div>
